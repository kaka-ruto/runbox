# Development docker-compose for Runbox
version: "3.8"

services:
  runbox:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env  # Load environment variables from .env file
    volumes:
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount source for development
      - ./src:/app/src:ro
      - ./runbox.yml:/app/runbox.yml:ro
    # Run as root to access Docker socket (in production, configure properly)
    user: root
    restart: unless-stopped
