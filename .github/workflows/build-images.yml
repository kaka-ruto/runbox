name: Build and Push Images

on:
  # Trigger on Dockerfile changes
  push:
    branches:
      - main
    paths:
      - 'images/*/Dockerfile'
      - 'images/shell/VERSION'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      language:
        description: 'Language to build (python/ruby/shell/all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - python
          - ruby
          - shell

env:
  REGISTRY: ghcr.io
  OWNER: anywaye

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        language: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.language == 'all' && fromJSON('["python", "ruby", "shell"]') || github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.language)) || fromJSON('["python", "ruby", "shell"]') }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Make scripts executable
        run: |
          chmod +x scripts/prod/build-and-push.sh
          chmod +x scripts/lib/common.sh
      
      - name: Build and push ${{ matrix.language }} image
        run: ./scripts/prod/build-and-push.sh ${{ matrix.language }}
      
      - name: Image summary
        run: |
          echo "### 🚀 Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Language:** ${{ matrix.language }}" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}/${{ env.OWNER }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
